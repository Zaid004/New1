const fmt = n => new Intl.NumberFormat('en').format(Math.round(Number(n)||0));

// Check if a task applies to a given date string (YYYY-MM-DD)
const taskApplies = (task, dateStr) => {
  if (!task.is_active) return false;
  const [y, m, d] = dateStr.split('-').map(Number);
  const jsDate = new Date(y, m - 1, d);
  if (task.recurrence === 'daily')   return true;
  if (task.recurrence === 'weekly')  return task.day_of_week === jsDate.getDay();
  if (task.recurrence === 'monthly') return task.day_of_month === d;
  if (task.recurrence === 'once')    return task.specific_date === dateStr;
  return false;
};

// Get public IP via ipify (unique per internet connection/location)
const getPublicIP = async () => {
  try {
    const res = await fetch('https://api4.ipify.org?format=json', {cache:'no-store'});
    const data = await res.json();
    return data.ip || null;
  } catch(e) { return null; }
};
const fmtNum = v => { if(v===''||v===undefined||v===null) return ''; const n=Number(String(v).replace(/,/g,'')); return isNaN(n)||n===0&&v===''?'':new Intl.NumberFormat('en').format(n); };
const parseNum = v => String(v).replace(/[^0-9.]/g,'');
const todayStr = () => new Date().toISOString().split('T')[0];
const monthRange = (y,m) => {
  const from = `${y}-${String(m+1).padStart(2,'0')}-01`;
  const last = new Date(y,m+1,0).getDate();
  const to   = `${y}-${String(m+1).padStart(2,'0')}-${String(last).padStart(2,'0')}`;
  return {from,to};
};
const calDays = (y,m) => {
  const arr=[], first=new Date(y,m,1).getDay(), last=new Date(y,m+1,0).getDate();
  for(let i=0;i<first;i++) arr.push(null);
  for(let d=1;d<=last;d++) arr.push(d);
  return arr;
};

// ── AUTH SCREEN ───────────────────────────────────────────────────────────────
function AuthScreen() {
  const [username,setUsername]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);

  const login = async () => {
    if(!username.trim()||!pass){setErr('أدخل اسم المستخدم وكلمة المرور');return;}
    setBusy(true); setErr('');
    try {
      const email=`${username.trim().toLowerCase()}@stacks-internal.app`;
      const {error} = await sb.auth.signInWithPassword({email,password:pass});
      if(error) setErr('اسم المستخدم أو كلمة المرور غير صحيحة');
    } catch(e) {
      setErr('خطأ في الاتصال، حاول مجدداً');
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-4" style={{background:C.bg}}>
      <div className="w-full max-w-sm">
        <div className="text-center mb-10">
          <div className="w-16 h-16 rounded-2xl mx-auto mb-3 flex items-center justify-center font-black text-2xl text-white" style={{background:C.primary}}>S</div>
          <div className="font-black text-xl tracking-widest" style={{color:C.primary}}>STACKS</div>
          <div className="text-xs mt-1" style={{color:C.txt,opacity:.5}}>Stationery</div>
        </div>
        <div className="rounded-3xl shadow-sm p-8" style={{background:C.card}}>
          <h2 className="font-bold text-lg mb-6" style={{color:C.txt}}>تسجيل الدخول</h2>
          {err && <div className="mb-4 p-3 rounded-xl text-sm text-center text-white" style={{background:C.err}}>{err}</div>}
          <div className="space-y-4">
            <div>
              <label className="text-xs font-semibold block mb-1" style={{color:C.txt}}>اسم المستخدم</label>
              <input type="text" value={username} onChange={e=>setUsername(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&login()}
                className="w-full p-3 rounded-xl border text-sm outline-none"
                style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}}
                placeholder="مثال: ahmad" autoCapitalize="none" autoCorrect="off" />
            </div>
            <div>
              <label className="text-xs font-semibold block mb-1" style={{color:C.txt}}>كلمة المرور</label>
              <input type="password" value={pass} onChange={e=>setPass(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&login()}
                className="w-full p-3 rounded-xl border text-sm outline-none"
                style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}}
                placeholder="••••••••" />
            </div>
            <button onClick={login} disabled={busy}
              className="w-full p-3 rounded-xl text-white font-bold transition-opacity"
              style={{background:C.primary,opacity:busy?.7:1}}>
              {busy?'جاري الدخول...':'دخول'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── DAY MODAL ────────────────────────────────────────────────────────────────
function DayModal({dateStr,recs,employees,me,isAdmin,onClose,onDone,allowedNetwork}) {
  const [busy,setBusy]=useState(false);
  const [netErr,setNetErr]=useState('');
  const [notes,setNotes]=useState(()=>{
    const init={};
    recs.forEach(r=>{if(r.note) init[r.employee_id]=r.note;});
    return init;
  });

  const getRec = empId => recs.find(r=>r.employee_id===empId);

  const upsert = async (empId, shiftType, autoGen=false) => {
    const ex = getRec(empId);
    const note = notes[empId]||null;
    if(ex){
      return sb.from('attendance_records').update({shift_type:shiftType,is_auto_generated:autoGen,note,updated_at:new Date().toISOString()}).eq('id',ex.id);
    } else {
      return sb.from('attendance_records').insert({employee_id:empId,date:dateStr,shift_type:shiftType,is_auto_generated:autoGen,note});
    }
  };

  const del = async empId => {
    const r=getRec(empId);
    if(r) await sb.from('attendance_records').delete().eq('id',r.id);
  };

  const handleEmp = async shiftType => {
    setNetErr('');
    if (allowedNetwork?.trim()) {
      setBusy(true);
      const currentIP = await getPublicIP();
      if (!currentIP) {
        setBusy(false);
        setNetErr('تعذّر التحقق من الشبكة، تأكد من الاتصال بالإنترنت');
        return;
      }
      if (currentIP !== allowedNetwork.trim()) {
        setBusy(false);
        setNetErr('تسجيل الحضور متاح فقط من شبكة المكتبة');
        return;
      }
    }
    setBusy(true);
    const {error} = await upsert(me.id, shiftType, false);
    if(error) console.error('upsert error:', error);
    setBusy(false);
    onDone();
  };

  const removeMyRecord = async () => {
    setBusy(true);
    const r = getRec(me.id);
    if(r){
      const {error} = await sb.from('attendance_records').delete().eq('id', r.id);
      if(error) console.error('delete error:', error);
      // الـ trigger يحذف سجل الزميل التلقائي تلقائياً
    }
    setBusy(false);
    onDone();
  };

  const handleAdmin = async (empId, action) => {
    setBusy(true);
    if(action==='del') await del(empId);
    else await upsert(empId, action, false);
    setBusy(false);
    onDone();
  };

  const [d,m,y] = [
    parseInt(dateStr.split('-')[2]),
    parseInt(dateStr.split('-')[1])-1,
    parseInt(dateStr.split('-')[0])
  ];

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center p-4"
      style={{background:'rgba(58,47,61,0.5)'}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="w-full max-w-sm rounded-3xl p-6 shadow-2xl mb-2" style={{background:C.card}}>
        <div className="flex items-center justify-between mb-5">
          <div className="font-bold text-lg" style={{color:C.txt}}>{d} {MONTHS[m]} {y}</div>
          <button onClick={onClose} className="p-2 rounded-xl" style={{background:C.soft}}>
            <Ic n="x" s={16} c={C.txt} />
          </button>
        </div>

        {isAdmin ? (
          <div className="space-y-3">
            {employees.filter(e=>e.role!=='admin').map(emp=>{
              const rec=getRec(emp.id);
              return (
                <div key={emp.id} className="p-4 rounded-2xl" style={{background:C.soft}}>
                  <div className="flex items-center gap-2 mb-3">
                    <div className="w-3 h-3 rounded-full" style={{background:emp.color_hex}}/>
                    <span className="font-semibold text-sm" style={{color:C.txt}}>{emp.name}</span>
                    {rec?.is_auto_generated&&<span className="text-xs px-2 py-0.5 rounded-full" style={{background:'#E8DDE5',color:C.primary}}>تلقائي</span>}
                    {rec&&<span className="text-xs px-2 py-0.5 rounded-full mr-auto" style={{background:emp.color_hex+'22',color:emp.color_hex}}>{rec.shift_type==='full'?'كامل':'نص'}</span>}
                  </div>
                  <div className="flex gap-2 mb-2">
                    <button onClick={()=>handleAdmin(emp.id,'full')}
                      className="flex-1 py-2 rounded-xl text-xs font-bold"
                      style={{background:rec?.shift_type==='full'?emp.color_hex:'#EEE8F0',color:rec?.shift_type==='full'?'#fff':C.txt}}>
                      شفت كامل
                    </button>
                    <button onClick={()=>handleAdmin(emp.id,'half')}
                      className="flex-1 py-2 rounded-xl text-xs font-bold"
                      style={{background:rec?.shift_type==='half'?emp.color_hex:'#EEE8F0',color:rec?.shift_type==='half'?'#fff':C.txt}}>
                      نص شفت
                    </button>
                    {rec&&(
                      <button onClick={()=>handleAdmin(emp.id,'del')}
                        className="py-2 px-3 rounded-xl"
                        style={{background:'var(--err-bg)'}}>
                        <Ic n="trash" s={14} c={C.err}/>
                      </button>
                    )}
                  </div>
                  <input type="text"
                    value={notes[emp.id]||''}
                    onChange={e=>setNotes(n=>({...n,[emp.id]:e.target.value}))}
                    className="w-full p-2 rounded-lg border text-xs outline-none"
                    style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}}
                    placeholder="ملاحظة..."/>
                </div>
              );
            })}
          </div>
        ) : (
          <div>
            <p className="text-sm mb-4" style={{color:C.txt,opacity:.6}}>سجّل حضورك لهذا اليوم</p>
            {netErr && (
              <div className="mb-3 p-3 rounded-xl text-sm text-center font-semibold"
                style={{background:'var(--err-bg)',color:C.err}}>
                {netErr}
              </div>
            )}
            <div className="flex gap-3 mb-3">
              {['full','half'].map(st=>{
                const rec=getRec(me.id);
                const active=rec?.shift_type===st;
                return (
                  <button key={st} onClick={()=>handleEmp(st)}
                    className="flex-1 py-4 rounded-2xl font-bold flex flex-col items-center gap-1"
                    style={{background:active?C.primary:C.soft,color:active?'#fff':C.txt}}>
                    <span>{st==='full'?'شفت كامل':'نص شفت'}</span>
                    <span className="text-xs opacity-70">{st==='full'?'نقطتان':'نقطة'}</span>
                  </button>
                );
              })}
            </div>
            <textarea
              value={notes[me.id]||''}
              onChange={e=>setNotes(n=>({...n,[me.id]:e.target.value}))}
              rows={2}
              className="w-full p-2.5 rounded-xl border text-sm outline-none resize-none mb-3"
              style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}}
              placeholder="ملاحظة اختيارية..."/>
            {getRec(me.id) && (
              <button onClick={removeMyRecord}
                className="w-full py-2 rounded-xl text-sm font-bold mb-4"
                style={{background:'var(--err-bg)',color:C.err}}>
                إلغاء الحضور
              </button>
            )}
            {employees.filter(e=>e.id!==me.id&&e.role!=='admin').map(emp=>{
              const rec=getRec(emp.id);
              if(!rec) return null;
              return (
                <div key={emp.id} className="p-3 rounded-xl text-sm mb-2" style={{background:C.soft}}>
                  <div className="flex items-center gap-2">
                    <div className="w-2 h-2 rounded-full" style={{background:emp.color_hex}}/>
                    <span style={{color:C.txt,opacity:.7}}>{emp.name}:</span>
                    <span className="font-semibold" style={{color:C.txt}}>{rec.shift_type==='full'?'شفت كامل':'نص شفت'}</span>
                    {rec.is_auto_generated&&<span className="text-xs opacity-40">(تلقائي)</span>}
                  </div>
                  {rec.note&&<div className="text-xs mt-1.5 pr-4" style={{color:C.txt,opacity:.55}}>{rec.note}</div>}
                </div>
              );
            })}
          </div>
        )}

        {busy&&<div className="mt-4 text-center text-sm" style={{color:C.primary}}>جاري الحفظ...</div>}
      </div>
    </div>
  );
}

// ── CALENDAR VIEW ─────────────────────────────────────────────────────────────
function CalendarView({me,employees,isAdmin,settings}) {
  const now = new Date();
  const [vy,setVy]=useState(now.getFullYear());
  const [vm,setVm]=useState(now.getMonth());
  const [recs,setRecs]=useState([]);
  const [modal,setModal]=useState(null);
  const [tasks,setTasks]=useState([]);
  const [completions,setCompletions]=useState([]);
  const [showTaskAdd,setShowTaskAdd]=useState(false);
  const [taskBusy,setTaskBusy]=useState(false);
  const initTaskForm=()=>({title:'',recurrence:'daily',day_of_week:0,day_of_month:1,specific_date:todayStr(),assigned_to:''});
  const [taskForm,setTaskForm]=useState(initTaskForm);

  const load = async (y,m) => {
    const {from,to}=monthRange(y,m);
    const {data}=await sb.from('attendance_records').select('*').gte('date',from).lte('date',to);
    setRecs(data||[]);
  };

  const loadCompletions = (y,m) => {
    const {from,to}=monthRange(y,m);
    sb.from('task_completions').select('*').gte('completed_date',from).lte('completed_date',to)
      .then(({data})=>setCompletions(data||[]));
  };

  useEffect(()=>{load(vy,vm);loadCompletions(vy,vm);},[vy,vm]);
  useEffect(()=>{
    sb.from('tasks').select('*').order('created_at',{ascending:false}).then(({data})=>setTasks(data||[]));
  },[]);

  const empOnly=employees.filter(e=>e.role!=='admin');

  const addTask = async () => {
    if(!taskForm.title.trim()) return;
    setTaskBusy(true);
    const payload={
      title:taskForm.title.trim(), recurrence:taskForm.recurrence, is_active:true,
      assigned_to:taskForm.assigned_to||null,
      day_of_week:taskForm.recurrence==='weekly'?parseInt(taskForm.day_of_week):null,
      day_of_month:taskForm.recurrence==='monthly'?parseInt(taskForm.day_of_month):null,
      specific_date:taskForm.recurrence==='once'?taskForm.specific_date:null,
    };
    const {data}=await sb.from('tasks').insert(payload).select().single();
    setTaskBusy(false);
    if(data){setTasks(ts=>[data,...ts]);setShowTaskAdd(false);setTaskForm(initTaskForm());}
  };

  const deleteTask = async id => {
    await sb.from('tasks').delete().eq('id',id);
    setTasks(ts=>ts.filter(t=>t.id!==id));
  };

  const toggleTaskActive = async task => {
    await sb.from('tasks').update({is_active:!task.is_active}).eq('id',task.id);
    setTasks(ts=>ts.map(t=>t.id===task.id?{...t,is_active:!t.is_active}:t));
  };

  const recLabel = t => {
    if(t.recurrence==='daily')   return 'يومي';
    if(t.recurrence==='weekly')  return `أسبوعي · ${DAYS[t.day_of_week]||''}`;
    if(t.recurrence==='monthly') return `شهري · يوم ${t.day_of_month}`;
    if(t.recurrence==='once')    return `مرة · ${t.specific_date||''}`;
    return '';
  };

  const myTasksForDate = dateStr => tasks.filter(t=>
    taskApplies(t,dateStr) && (!t.assigned_to || t.assigned_to===me.id)
  );
  const dayHasTasks = dateStr => isAdmin
    ? tasks.some(t=>taskApplies(t,dateStr))
    : myTasksForDate(dateStr).length>0;
  const isCompleted = (taskId,dateStr) =>
    completions.some(c=>c.task_id===taskId&&c.employee_id===me.id&&c.completed_date===dateStr);
  const toggleComplete = async (taskId,dateStr) => {
    const ex=completions.find(c=>c.task_id===taskId&&c.employee_id===me.id&&c.completed_date===dateStr);
    if(ex){
      await sb.from('task_completions').delete().eq('id',ex.id);
      setCompletions(cs=>cs.filter(c=>c.id!==ex.id));
    } else {
      const {data}=await sb.from('task_completions').insert({task_id:taskId,employee_id:me.id,completed_date:dateStr}).select().single();
      if(data) setCompletions(cs=>[...cs,data]);
    }
  };

  const prevMonth = () => { if(vm===0){setVy(y=>y-1);setVm(11);}else setVm(m=>m-1); };
  const nextMonth = () => { if(vm===11){setVy(y=>y+1);setVm(0);}else setVm(m=>m+1); };

  const dayRecs = d => {
    if(!d) return [];
    const ds=`${vy}-${String(vm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    return recs.filter(r=>r.date===ds);
  };

  const canEdit = d => {
    if(!d) return false;
    if(isAdmin) return true;
    const ds=`${vy}-${String(vm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    return ds===todayStr();
  };

  const openDay = d => {
    if(!canEdit(d)) return;
    const ds=`${vy}-${String(vm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    setModal({dateStr:ds,recs:dayRecs(d)});
  };

  const getEmpColor = id => employees.find(e=>e.id===id)?.color_hex||C.primary;

  const cells = calDays(vy,vm);

  return (
    <div>
      {/* Nav */}
      <div className="flex items-center justify-between mb-4">
        <button onClick={prevMonth} className="p-2 rounded-xl" style={{background:C.card,color:C.primary}}><Ic n="chR" s={18}/></button>
        <div className="font-bold" style={{color:C.txt}}>{MONTHS[vm]} {vy}</div>
        <button onClick={nextMonth} className="p-2 rounded-xl" style={{background:C.card,color:C.primary}}><Ic n="chL" s={18}/></button>
      </div>

      {/* Day headers */}
      <div className="cal-grid mb-1">
        {DAYS.map(d=>(
          <div key={d} className="text-center text-xs font-semibold py-1" style={{color:C.txt,opacity:.4}}>{d}</div>
        ))}
      </div>

      {/* Cells */}
      <div className="cal-grid">
        {cells.map((d,i)=>{
          if(!d) return <div key={i}/>;
          const dr=dayRecs(d);
          const ds=`${vy}-${String(vm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const isToday=ds===todayStr();
          const editable=canEdit(d);
          const hasTasks=dayHasTasks(ds);

          let bg = C.soft;
          let overlay = null;
          if(dr.length===1){
            bg=getEmpColor(dr[0].employee_id);
          } else if(dr.length>=2){
            const c1=getEmpColor(dr[0].employee_id), c2=getEmpColor(dr[1].employee_id);
            overlay=(
              <>
                <div style={{position:'absolute',inset:0,background:c1,clipPath:'polygon(0 0,100% 0,0 100%)'}}/>
                <div style={{position:'absolute',inset:0,background:c2,clipPath:'polygon(100% 0,100% 100%,0 100%)'}}/>
              </>
            );
            bg='transparent';
          }

          return (
            <div key={i} className="day-cell" onClick={()=>openDay(d)}
              style={{
                background:dr.length<2?bg:'transparent',
                border:`2px solid ${isToday?C.primary:'transparent'}`,
                cursor:editable?'pointer':'default',
                transition:'transform .1s',
              }}
              onMouseEnter={e=>{if(editable)e.currentTarget.style.transform='scale(1.04)';}}
              onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';}}>
              {overlay}
              {hasTasks&&<div style={{position:'absolute',top:3,right:3,width:6,height:6,borderRadius:'50%',background:'#F59E0B',zIndex:3,border:'1.5px solid rgba(255,255,255,0.8)'}}/>}
              <div style={{position:'relative',zIndex:1,padding:'4px 5px'}}>
                <span className="text-xs font-bold leading-none" style={{color:dr.length>0?'#fff':C.txt}}>{d}</span>
              </div>
              {dr.length>0&&(
                <div style={{position:'relative',zIndex:1,padding:'0 5px 4px'}}>
                  {dr.map(r=>{
                    const emp=employees.find(e=>e.id===r.employee_id);
                    return (
                      <div key={r.id} className="text-white leading-tight" style={{fontSize:9,fontWeight:700}}>
                        {emp?.name?.split(' ')[0]} · {r.shift_type==='full'?'ك':'ن'}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Legend */}
      <div className="flex gap-4 mt-4 justify-center">
        {employees.map(e=>(
          <div key={e.id} className="flex items-center gap-1.5">
            <div className="w-3 h-3 rounded-full" style={{background:e.color_hex}}/>
            <span className="text-xs" style={{color:C.txt,opacity:.7}}>{e.name}</span>
          </div>
        ))}
        <div className="flex items-center gap-1.5">
          <div className="w-8 h-3 rounded" style={{background:`linear-gradient(to right, ${C.e1} 50%, ${C.e2} 50%)`}}/>
          <span className="text-xs" style={{color:C.txt,opacity:.7}}>مشترك</span>
        </div>
      </div>

      {/* Employee: today's tasks */}
      {!isAdmin && (()=>{
        const today=todayStr();
        const todayTasks=myTasksForDate(today);
        if(!todayTasks.length) return null;
        return (
          <div className="mt-4 space-y-2">
            <div className="flex items-center gap-2 px-1 mb-1">
              <Ic n="task" s={15} c={C.primary}/>
              <span className="text-xs font-bold uppercase tracking-widest" style={{color:C.primary}}>مهام اليوم</span>
            </div>
            {todayTasks.map(task=>{
              const done=isCompleted(task.id,today);
              return (
                <div key={task.id} className="flex items-center gap-3 p-3 rounded-2xl shadow-sm" style={{background:C.card}}>
                  <button onClick={()=>toggleComplete(task.id,today)}
                    className="w-7 h-7 rounded-xl flex items-center justify-center flex-shrink-0 transition-all"
                    style={{background:done?C.ok:C.soft,border:`2px solid ${done?C.ok:C.border}`}}>
                    {done&&<Ic n="check" s={13} c="#fff"/>}
                  </button>
                  <span className="text-sm font-semibold flex-1" style={{color:C.txt,textDecoration:done?'line-through':'none',opacity:done?.5:1}}>
                    {task.title}
                  </span>
                  <span className="text-xs px-2 py-0.5 rounded-full" style={{background:C.soft,color:C.txt,opacity:.6}}>
                    {task.recurrence==='daily'?'يومي':task.recurrence==='weekly'?'أسبوعي':task.recurrence==='monthly'?'شهري':'مرة'}
                  </span>
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* Admin: task management */}
      {isAdmin&&(
        <div className="mt-4 space-y-3">
          <div className="flex items-center justify-between px-1">
            <div className="flex items-center gap-2">
              <Ic n="task" s={15} c={C.primary}/>
              <span className="text-xs font-bold uppercase tracking-widest" style={{color:C.primary}}>إدارة المهام</span>
            </div>
            <button onClick={()=>setShowTaskAdd(s=>!s)}
              className="w-8 h-8 rounded-xl flex items-center justify-center"
              style={{background:showTaskAdd?C.soft:C.primary}}>
              <Ic n="plus" s={16} c={showTaskAdd?C.txt:'#fff'}/>
            </button>
          </div>
          <div className="rounded-2xl p-5 shadow-sm space-y-3" style={{background:C.card}}>
            {showTaskAdd&&(
              <div className="space-y-3 p-4 rounded-2xl" style={{background:C.soft}}>
                <input type="text" value={taskForm.title} onChange={e=>setTaskForm(f=>({...f,title:e.target.value}))}
                  className="w-full p-3 rounded-xl border text-sm outline-none"
                  style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}}
                  placeholder="عنوان المهمة..."/>
                <div className="grid grid-cols-2 gap-2">
                  {[['daily','يومي'],['weekly','أسبوعي'],['monthly','شهري'],['once','مرة واحدة']].map(([v,l])=>(
                    <button key={v} onClick={()=>setTaskForm(f=>({...f,recurrence:v}))}
                      className="py-2 rounded-xl text-sm font-bold"
                      style={{background:taskForm.recurrence===v?C.primary:C.card,color:taskForm.recurrence===v?'#fff':C.txt}}>
                      {l}
                    </button>
                  ))}
                </div>
                {taskForm.recurrence==='weekly'&&(
                  <select value={taskForm.day_of_week} onChange={e=>setTaskForm(f=>({...f,day_of_week:e.target.value}))}
                    className="w-full p-3 rounded-xl border text-sm outline-none"
                    style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}}>
                    {DAYS.map((d,i)=><option key={i} value={i}>{d}</option>)}
                  </select>
                )}
                {taskForm.recurrence==='monthly'&&(
                  <input type="number" min="1" max="31" value={taskForm.day_of_month}
                    onChange={e=>setTaskForm(f=>({...f,day_of_month:e.target.value}))}
                    className="w-full p-3 rounded-xl border text-sm outline-none"
                    style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}}
                    placeholder="يوم الشهر (1-31)"/>
                )}
                {taskForm.recurrence==='once'&&(
                  <input type="date" value={taskForm.specific_date}
                    onChange={e=>setTaskForm(f=>({...f,specific_date:e.target.value}))}
                    className="w-full p-3 rounded-xl border text-sm outline-none"
                    style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}}/>
                )}
                <select value={taskForm.assigned_to} onChange={e=>setTaskForm(f=>({...f,assigned_to:e.target.value}))}
                  className="w-full p-3 rounded-xl border text-sm outline-none"
                  style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}}>
                  <option value="">جميع الموظفين</option>
                  {empOnly.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
                </select>
                <button onClick={addTask} disabled={taskBusy||!taskForm.title.trim()}
                  className="w-full py-3 rounded-xl font-bold text-white"
                  style={{background:taskBusy||!taskForm.title.trim()?'#999':C.primary}}>
                  {taskBusy?'جاري الإضافة...':'إضافة المهمة'}
                </button>
              </div>
            )}
            {tasks.length===0&&!showTaskAdd&&(
              <div className="text-center py-3 text-sm" style={{color:C.txt,opacity:.4}}>لا توجد مهام بعد</div>
            )}
            {tasks.map(task=>(
              <div key={task.id} className="flex items-center gap-2 p-3 rounded-2xl" style={{background:C.soft,opacity:task.is_active?1:.5}}>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-sm truncate" style={{color:C.txt}}>{task.title}</div>
                  <div className="text-xs mt-0.5" style={{color:C.txt,opacity:.5}}>
                    {recLabel(task)}{task.assigned_to&&` · ${employees.find(e=>e.id===task.assigned_to)?.name||''}`}
                  </div>
                </div>
                <button onClick={()=>toggleTaskActive(task)} className="p-1.5 rounded-lg"
                  style={{background:task.is_active?'var(--ok-bg)':'var(--err-bg)'}}>
                  <Ic n={task.is_active?'check':'x'} s={13} c={task.is_active?C.ok:C.err}/>
                </button>
                <button onClick={()=>deleteTask(task.id)} className="p-1.5 rounded-lg" style={{background:'var(--err-bg)'}}>
                  <Ic n="trash" s={13} c={C.err}/>
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {modal&&(
        <DayModal
          dateStr={modal.dateStr}
          recs={modal.recs}
          employees={employees}
          me={me}
          isAdmin={isAdmin}
          allowedNetwork={settings?.allowed_network||''}
          onClose={()=>setModal(null)}
          onDone={()=>{load(vy,vm);setModal(null);}}
        />
      )}
    </div>
  );
}

// ── EMPLOYEE DASHBOARD ────────────────────────────────────────────────────────
function EmpDashboard({me,employees,settings,onRefresh}) {
  const COLORS = ['#6B5876','#A8825B','#7A8B6F','#B0594F','#5876A8','#8B6F7A'];
  const now=new Date();
  const [recs,setRecs]=useState([]);
  const [sales,setSales]=useState('');
  const [extra,setExtra]=useState('');
  const [showCalc,setShowCalc]=useState(false);
  const [showColor,setShowColor]=useState(false);
  const [myColor,setMyColor]=useState(me.color_hex);
  const [colorBusy,setColorBusy]=useState(false);
  const [colorMsg,setColorMsg]=useState('');
  const [loyBusy,setLoyBusy]=useState(false);
  const [loyMsg,setLoyMsg]=useState('');
  const [showDel,setShowDel]=useState(false);
  const [delDateMode,setDelDateMode]=useState('yesterday');
  const [delFrom,setDelFrom]=useState(todayStr());
  const [delTo,setDelTo]=useState(todayStr());
  const [delBusy,setDelBusy]=useState(false);
  const [delResult,setDelResult]=useState(null);
  const [delErr,setDelErr]=useState('');
  const [delCalcBusy,setDelCalcBusy]=useState(false);
  const [delCalcMsg,setDelCalcMsg]=useState('');

  const getDelRange = () => {
    const toISO=(ds,end=false)=>new Date(`${ds}T${end?'23:59:59.999':'00:00:00.000'}+03:00`).toISOString();
    const today=todayStr();
    const yest=(()=>{const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split('T')[0];})();
    if(delDateMode==='today')     return {from:toISO(today),     to:toISO(today,true)};
    if(delDateMode==='yesterday') return {from:toISO(yest),      to:toISO(yest,true)};
    if(delDateMode==='week'){
      const d=new Date(),ws=new Date(d);
      ws.setDate(d.getDate()-(d.getDay()+1)%7);
      return {from:toISO(ws.toISOString().split('T')[0]),to:toISO(today,true)};
    }
    if(delDateMode==='month'){
      const d=new Date();
      return {from:toISO(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`),to:toISO(today,true)};
    }
    return {from:toISO(delFrom),to:toISO(delTo,true)};
  };

  const fetchMyDelivery = async () => {
    setDelBusy(true); setDelErr(''); setDelResult(null);
    const {from,to}=getDelRange();
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPA_URL}/functions/v1/get-loyverse-sales`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({mode:'delivery_stats',from,to,payment_filters:['توصيل','ماستر توصيل']}),
    });
    const data=await res.json();
    setDelBusy(false);
    if(data.error){setDelErr(data.error);return;}
    const myName=(me.name||'').toLowerCase();
    const myUser=(me.username||'').toLowerCase();
    const mine=data.stats.find(s=>{
      const emp=s.employee.toLowerCase();
      return myName.includes(emp)||emp.includes(myName)||myUser.includes(emp)||emp.includes(myUser);
    });
    if(!mine){setDelResult({orders:0,bonus:0});return;}
    setDelResult(mine);
  };

  const fetchLoyverse = async () => {
    setLoyBusy(true); setLoyMsg('');
    const {data:{session}} = await sb.auth.getSession();
    const m = String(now.getMonth()+1).padStart(2,'0');
    const res = await fetch(`${SUPA_URL}/functions/v1/get-loyverse-sales`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},
      body: JSON.stringify({month:`${now.getFullYear()}-${m}`}),
    });
    const data = await res.json();
    setLoyBusy(false);
    if(data.error){ setLoyMsg('خطأ: '+data.error); setTimeout(()=>setLoyMsg(''),4000); return; }
    setSales(String(data.total));
    setLoyMsg(`تم جلب ${fmt(data.total)} د.ع`);
    setTimeout(()=>setLoyMsg(''),3000);
  };

  const fetchCalcDelivery = async () => {
    setDelCalcBusy(true); setDelCalcMsg('');
    const d=now;
    const y=d.getFullYear(), mo=String(d.getMonth()+1).padStart(2,'0');
    const lastDay=new Date(y,d.getMonth()+1,0).getDate();
    const from=new Date(`${y}-${mo}-01T00:00:00.000+03:00`).toISOString();
    const to=new Date(`${y}-${mo}-${String(lastDay).padStart(2,'0')}T23:59:59.999+03:00`).toISOString();
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPA_URL}/functions/v1/get-loyverse-sales`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({mode:'delivery_stats',from,to,payment_filters:['توصيل','ماستر توصيل']}),
    });
    const data=await res.json();
    setDelCalcBusy(false);
    if(data.error){setDelCalcMsg('خطأ: '+data.error);setTimeout(()=>setDelCalcMsg(''),4000);return;}
    const myName=(me.name||'').toLowerCase();
    const myUser=(me.username||'').toLowerCase();
    const mine=data.stats?.find(s=>{
      const emp=s.employee.toLowerCase();
      return myName.includes(emp)||emp.includes(myName)||myUser.includes(emp)||emp.includes(myUser);
    });
    if(!mine||mine.orders===0){setDelCalcMsg('لا توجد طلبات توصيل هذا الشهر');setTimeout(()=>setDelCalcMsg(''),4000);return;}
    setExtra(String(mine.bonus));
    setDelCalcMsg(`${mine.orders} طلب × 400 = ${fmt(mine.bonus)} د.ع`);
    setTimeout(()=>setDelCalcMsg(''),5000);
  };

  useEffect(()=>{
    const {from,to}=monthRange(now.getFullYear(),now.getMonth());
    sb.from('attendance_records').select('*').gte('date',from).lte('date',to).then(({data})=>setRecs(data||[]));
  },[]);

  const pool   = settings?.monthly_pool_amount||525000;
  const pct    = settings?.monthly_percentage||3.2;
  const empOnlyIds = new Set(employees.filter(e=>e.role!=='admin').map(e=>e.id));
  const myRecs = recs.filter(r=>r.employee_id===me.id);
  const allPts = recs.filter(r=>empOnlyIds.has(r.employee_id)).reduce((s,r)=>s+pts(r),0);
  const myPts  = myRecs.reduce((s,r)=>s+pts(r),0);
  const myDays = myRecs.reduce((s,r)=>s+days(r),0);

  const fixedShare = allPts>0?(myPts/allPts)*pool:0;
  const salesAmt   = parseFloat(sales)||0;
  const pctShare   = allPts>0?(myPts/allPts)*(salesAmt*pct/100):0;
  const extraAmt   = parseFloat(extra)||0;
  const total      = fixedShare+pctShare+extraAmt;

  const saveColor = async () => {
    setColorBusy(true); setColorMsg('');
    const {error} = await sb.rpc('update_my_color', {new_color: myColor});
    setColorBusy(false);
    if(error){ setColorMsg('حدث خطأ، حاول مجدداً'); return; }
    setColorMsg('تم تحديث اللون');
    if(onRefresh) onRefresh();
    setTimeout(()=>setColorMsg(''),2500);
  };

  return (
    <div className="space-y-4">
      <div className="grid grid-cols-2 gap-3">
        <div className="rounded-2xl p-5 shadow-sm" style={{background:C.card}}>
          <div className="text-xs font-semibold mb-1" style={{color:C.txt,opacity:.5}}>أيام {MONTHS[now.getMonth()]}</div>
          <div className="text-4xl font-black" style={{color:C.primary}}>{myDays}</div>
        </div>
        <div className="rounded-2xl p-5 shadow-sm" style={{background:C.card}}>
          <div className="text-xs font-semibold mb-1" style={{color:C.txt,opacity:.5}}>النقاط</div>
          <div className="text-4xl font-black" style={{color:C.e2}}>{myPts}</div>
          <div className="text-xs" style={{color:C.txt,opacity:.4}}>من {allPts}</div>
        </div>
      </div>

      <button onClick={()=>setShowCalc(v=>!v)}
        className="w-full p-4 rounded-2xl font-bold text-white flex items-center justify-between"
        style={{background:C.primary}}>
        <span>حاسبة الراتب التقديرية</span>
        <Ic n={showCalc?'chL':'chR'} s={18} c="#fff"/>
      </button>

      {showCalc&&(
        <div className="rounded-2xl p-5 shadow-sm space-y-4" style={{background:C.card}}>
          <div className="grid grid-cols-2 gap-3">
            <div className="p-3 rounded-xl" style={{background:C.soft}}>
              <div className="text-xs mb-1" style={{color:C.txt,opacity:.5}}>الحصة الثابتة</div>
              <div className="font-bold text-sm" style={{color:C.txt}}>{fmt(fixedShare)} د.ع</div>
            </div>
            <div className="p-3 rounded-xl" style={{background:C.soft}}>
              <div className="text-xs mb-1" style={{color:C.txt,opacity:.5}}>حصة النسبة ({pct}%)</div>
              <div className="font-bold text-sm" style={{color:C.txt}}>{fmt(pctShare)} د.ع</div>
            </div>
          </div>
          <div>
            <label className="text-xs font-semibold block mb-1" style={{color:C.txt}}>حجم المبيعات (د.ع)</label>
            <div className="flex gap-1.5">
              <input type="text" inputMode="numeric" value={fmtNum(sales)} onChange={e=>setSales(parseNum(e.target.value))}
                className="flex-1 p-3 rounded-xl border text-sm outline-none"
                style={{borderColor:C.border}} placeholder="0"/>
              <button onClick={fetchLoyverse} disabled={loyBusy} title="جلب من Loyverse"
                className="px-3 rounded-xl text-xs font-black text-white flex-shrink-0"
                style={{background:loyBusy?'#999':C.ok}}>
                {loyBusy?'..':'L'}
              </button>
            </div>
            {loyMsg&&<div className="mt-1.5 text-xs font-semibold text-center py-1.5 rounded-lg"
              style={{background:loyMsg.startsWith('خطأ')?'var(--err-bg)':'var(--ok-bg)',
                      color:loyMsg.startsWith('خطأ')?C.err:C.ok}}>{loyMsg}</div>}
          </div>
          <div>
            <label className="text-xs font-semibold block mb-1" style={{color:C.txt}}>مبلغ إضافي (اختياري)</label>
            <input type="text" inputMode="numeric" value={fmtNum(extra)} onChange={e=>setExtra(parseNum(e.target.value))}
              className="w-full p-3 rounded-xl border text-sm outline-none"
              style={{borderColor:C.border}} placeholder="0"/>
            <button onClick={fetchCalcDelivery} disabled={delCalcBusy}
              className="mt-2 w-full py-2 rounded-xl text-xs font-bold"
              style={{background:C.soft,color:delCalcBusy?'#999':C.primary}}>
              {delCalcBusy?'جاري الجلب...':'مكافأة التوصيل (هذا الشهر)'}
            </button>
            {delCalcMsg&&<div className="mt-1.5 text-xs font-semibold text-center py-1.5 rounded-lg"
              style={{background:delCalcMsg.startsWith('خطأ')||delCalcMsg.startsWith('لا')?C.soft:'var(--ok-bg)',
                      color:delCalcMsg.startsWith('خطأ')||delCalcMsg.startsWith('لا')?C.txt:C.ok}}>{delCalcMsg}</div>}
          </div>
          <div className="p-4 rounded-2xl text-center" style={{background:C.primary}}>
            <div className="text-white text-xs opacity-70 mb-1">الإجمالي التقديري</div>
            <div className="text-white text-3xl font-black">{fmt(total)}</div>
            <div className="text-white text-sm opacity-70">د.ع</div>
          </div>
        </div>
      )}

      <button onClick={()=>{setShowDel(v=>!v);setDelResult(null);setDelErr('');}}
        className="w-full p-4 rounded-2xl font-bold flex items-center justify-between"
        style={{background:C.card}}>
        <span style={{color:C.txt}}>مكافأة التوصيل</span>
        <Ic n={showDel?'chL':'chR'} s={18} c={C.primary}/>
      </button>

      {showDel&&(
        <div className="rounded-2xl p-5 shadow-sm space-y-3" style={{background:C.card}}>
          <div className="grid grid-cols-2 gap-2">
            {[['today','اليوم'],['yesterday','البارحة'],['week','هذا الأسبوع'],['month','هذا الشهر'],['custom','مخصص']].map(([v,l])=>(
              <button key={v} onClick={()=>{setDelDateMode(v);setDelResult(null);}}
                className="py-2 rounded-xl text-sm font-bold"
                style={{background:delDateMode===v?C.primary:C.soft,color:delDateMode===v?'#fff':C.txt}}>
                {l}
              </button>
            ))}
          </div>
          {delDateMode==='custom'&&(
            <div className="grid grid-cols-2 gap-2">
              <div>
                <label className="text-xs font-semibold block mb-1" style={{color:C.txt}}>من</label>
                <input type="date" value={delFrom} onChange={e=>{setDelFrom(e.target.value);setDelResult(null);}}
                  className="w-full p-2.5 rounded-xl border text-sm outline-none"
                  style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}}/>
              </div>
              <div>
                <label className="text-xs font-semibold block mb-1" style={{color:C.txt}}>إلى</label>
                <input type="date" value={delTo} onChange={e=>{setDelTo(e.target.value);setDelResult(null);}}
                  className="w-full p-2.5 rounded-xl border text-sm outline-none"
                  style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}}/>
              </div>
            </div>
          )}
          {delErr&&<div className="p-2.5 rounded-xl text-xs text-center text-white" style={{background:C.err}}>{delErr}</div>}
          <button onClick={fetchMyDelivery} disabled={delBusy}
            className="w-full py-3 rounded-xl font-bold text-white"
            style={{background:delBusy?'#999':C.primary}}>
            {delBusy?'جاري الاستعلام...':'استعلام'}
          </button>
          {delResult&&(
            <div className="grid grid-cols-2 gap-3 pt-1">
              <div className="rounded-2xl p-4 text-center" style={{background:C.soft}}>
                <div className="text-3xl font-black" style={{color:C.primary}}>{delResult.orders}</div>
                <div className="text-xs mt-1" style={{color:C.txt,opacity:.5}}>طلب توصيل</div>
              </div>
              <div className="rounded-2xl p-4 text-center" style={{background:C.soft}}>
                <div className="text-2xl font-black" style={{color:C.ok}}>{fmt(delResult.bonus)}</div>
                <div className="text-xs mt-1" style={{color:C.txt,opacity:.5}}>د.ع مكافأة</div>
              </div>
            </div>
          )}
        </div>
      )}

      <BoxkiMatcher/>

      {/* Color picker */}
      <button onClick={()=>setShowColor(v=>!v)}
        className="w-full p-4 rounded-2xl font-bold flex items-center justify-between"
        style={{background:C.card}}>
        <div className="flex items-center gap-3">
          <div className="w-7 h-7 rounded-lg" style={{background:myColor}}/>
          <span style={{color:C.txt}}>لون ملفك الشخصي</span>
        </div>
        <Ic n={showColor?'chL':'chR'} s={18} c={C.primary}/>
      </button>

      {showColor && (
        <div className="rounded-2xl p-5 shadow-sm space-y-4" style={{background:C.card}}>
          <div className="flex gap-3 justify-center">
            {COLORS.map(col=>(
              <button key={col} onClick={()=>setMyColor(col)}
                className="w-10 h-10 rounded-xl transition-transform"
                style={{background:col,transform:myColor===col?'scale(1.2)':'scale(1)',outline:myColor===col?`2px solid ${col}`:undefined,outlineOffset:3}}/>
            ))}
          </div>
          {colorMsg && (
            <div className="text-center text-sm font-semibold" style={{color: colorMsg.includes('خطأ')?C.err:C.ok}}>
              {colorMsg}
            </div>
          )}
          <button onClick={saveColor} disabled={colorBusy}
            className="w-full py-3 rounded-xl font-bold text-white"
            style={{background:colorBusy?'#999':C.ok}}>
            {colorBusy?'جاري الحفظ...':'حفظ اللون'}
          </button>
        </div>
      )}

      {/* Payslip archive */}
      <PayslipArchive empId={me.id}/>

      {/* Notification enable button */}
      <NotifButton/>
    </div>
  );
}

// ── PAYSLIP ARCHIVE (employee) ────────────────────────────────────────────────
function PayslipArchive({empId}) {
  const [show,setShow]=useState(false);
  const [slips,setSlips]=useState([]);
  const [loading,setLoading]=useState(false);

  useEffect(()=>{
    if(!show) return;
    setLoading(true);
    sb.from('payslips').select('*').eq('employee_id',empId)
      .order('month',{ascending:false}).limit(24)
      .then(({data})=>{setSlips(data||[]);setLoading(false);});
  },[show]);

  const total = s => (s.fixed_amount||0)+(s.percentage_amount||0)+(s.bonus||0)+(s.extra_amount||0);

  return (
    <div>
      <button onClick={()=>setShow(v=>!v)}
        className="w-full p-4 rounded-2xl font-bold flex items-center justify-between"
        style={{background:C.card}}>
        <div className="flex items-center gap-3">
          <Ic n="report" s={18} c={C.e2}/>
          <span style={{color:C.txt}}>كشوفات الرواتب السابقة</span>
        </div>
        <Ic n={show?'chL':'chR'} s={18} c={C.primary}/>
      </button>
      {show && (
        <div className="rounded-2xl shadow-sm overflow-hidden" style={{background:C.card}}>
          {loading && <div className="p-6 text-center text-sm" style={{color:C.txt,opacity:.4}}>جاري التحميل...</div>}
          {!loading && slips.length===0 && <div className="p-6 text-center text-sm" style={{color:C.txt,opacity:.4}}>لا توجد كشوفات بعد</div>}
          {slips.map(s=>{
            const d=new Date(s.month+'T00:00:00');
            return (
              <div key={s.id} className="flex items-center justify-between px-4 py-3 border-b" style={{borderColor:C.border}}>
                <div className="font-semibold text-sm" style={{color:C.txt}}>
                  {MONTHS[d.getMonth()]} {d.getFullYear()}
                </div>
                <div className="font-black text-sm" style={{color:C.ok}}>{fmt(total(s))} <span className="font-normal text-xs">د.ع</span></div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── NOTIFICATION BUTTON ───────────────────────────────────────────────────────
function NotifButton() {
  const [perm,setPerm]=useState(typeof Notification!=='undefined'?Notification.permission:'denied');
  if(perm==='denied'||perm==='granted') return null;
  return (
    <button onClick={async()=>{const p=await requestNotifPermission();setPerm(p?'granted':'denied');}}
      className="w-full p-4 rounded-2xl font-bold flex items-center gap-3"
      style={{background:C.card}}>
      <Ic n="bell" s={18} c={C.e2}/>
      <span style={{color:C.txt}}>تفعيل تنبيهات الحضور اليومية</span>
    </button>
  );
}

// ── BOXKI MATCHER ─────────────────────────────────────────────────────────────
function BoxkiMatcher() {
  const getIraqToday = () => new Date(Date.now()+3*60*60*1000).toISOString().slice(0,10);
  const toISO = dt => new Date(dt+':00.000+03:00').toISOString();

  const [show,setShow]=useState(false);
  const [amount,setAmount]=useState('');
  const [orders,setOrders]=useState('');
  const [fromDt,setFromDt]=useState(()=>`${getIraqToday()}T00:00`);
  const [toDt,setToDt]=useState(()=>`${getIraqToday()}T23:59`);
  const [loyLoading,setLoyLoading]=useState(false);
  const [loyData,setLoyData]=useState(null);
  const [loyErr,setLoyErr]=useState('');

  const reset = () => { setLoyData(null); setLoyErr(''); };

  const amt=parseFloat(amount)||0;
  const ord=parseFloat(orders)||0;
  const deduction=ord*5000;
  const result=amt-deduction;
  const hasResult=amt>0&&ord>0;

  const matchLoyverse = async () => {
    setLoyLoading(true); setLoyData(null); setLoyErr('');
    try {
      const {data:{session}} = await sb.auth.getSession();
      const res = await fetch(`${SUPA_URL}/functions/v1/get-loyverse-sales`, {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},
        body: JSON.stringify({mode:'delivery', from:toISO(fromDt), to:toISO(toDt)}),
      });
      const data = await res.json();
      if(data.error){ setLoyErr(data.error); return; }
      setLoyData(data);
    } catch(e) {
      setLoyErr('خطأ في الاتصال');
    } finally {
      setLoyLoading(false);
    }
  };

  const diff = loyData ? Math.round(result) - loyData.total : 0;
  const isMatch = loyData && diff === 0;

  return (
    <div>
      <button onClick={()=>setShow(v=>!v)}
        className="w-full p-4 rounded-2xl font-bold flex items-center justify-between"
        style={{background:C.card}}>
        <div className="flex items-center gap-3">
          <BoxkiIcon s={24}/>
          <span style={{color:C.txt}}>مطابقة بوكسي</span>
        </div>
        <Ic n={show?'chL':'chR'} s={18} c={C.primary}/>
      </button>
      {show&&(
        <div className="rounded-2xl p-5 shadow-sm space-y-4" style={{background:C.card}}>
          <div>
            <label className="text-xs font-semibold block mb-1" style={{color:C.txt}}>المبلغ الكلي من بوكسي (د.ع)</label>
            <input type="text" inputMode="numeric" value={fmtNum(amount)}
              onChange={e=>{setAmount(parseNum(e.target.value));reset();}}
              className="w-full p-3 rounded-xl border text-sm outline-none"
              style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}} placeholder="0"/>
          </div>
          <div>
            <label className="text-xs font-semibold block mb-1" style={{color:C.txt}}>عدد الطلبات</label>
            <input type="text" inputMode="numeric" value={orders}
              onChange={e=>{setOrders(parseNum(e.target.value));reset();}}
              className="w-full p-3 rounded-xl border text-sm outline-none"
              style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}} placeholder="0"/>
          </div>
          {hasResult&&(
            <div className="space-y-3">
              <div className="flex justify-between items-center text-sm px-1">
                <span style={{color:C.txt,opacity:.6}}>خصم التوصيل ({ord} × 5,000)</span>
                <span className="font-bold" style={{color:C.err}}>- {fmt(deduction)} د.ع</span>
              </div>
              <div className="p-4 rounded-2xl text-center" style={{background:C.primary}}>
                <div className="text-white text-xs opacity-70 mb-1">صافي المبلغ</div>
                <div className="text-white text-3xl font-black">{fmt(result)}</div>
                <div className="text-white text-sm opacity-70">د.ع</div>
              </div>

              <div className="rounded-xl p-3 space-y-2" style={{background:C.soft}}>
                <div className="text-xs font-semibold" style={{color:C.txt,opacity:.6}}>الفترة الزمنية</div>
                <div className="grid grid-cols-2 gap-2">
                  <div>
                    <div className="text-xs mb-1" style={{color:C.txt,opacity:.5}}>من</div>
                    <input type="datetime-local" value={fromDt}
                      onChange={e=>{setFromDt(e.target.value);reset();}}
                      className="w-full p-2 rounded-lg border text-xs outline-none"
                      style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}}/>
                  </div>
                  <div>
                    <div className="text-xs mb-1" style={{color:C.txt,opacity:.5}}>إلى</div>
                    <input type="datetime-local" value={toDt}
                      onChange={e=>{setToDt(e.target.value);reset();}}
                      className="w-full p-2 rounded-lg border text-xs outline-none"
                      style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}}/>
                  </div>
                </div>
              </div>

              <button onClick={matchLoyverse} disabled={loyLoading}
                className="w-full py-3 rounded-xl font-bold text-white text-sm"
                style={{background:loyLoading?'#999':C.e2}}>
                {loyLoading?'جاري الجلب...':'مطابقة مع Loyverse'}
              </button>

              {loyErr&&(
                <div className="p-3 rounded-xl text-sm text-center" style={{background:'var(--err-bg)',color:C.err}}>
                  {loyErr}
                </div>
              )}

              {loyData&&(
                <div className="space-y-2">
                  <div className="flex justify-between items-center text-sm px-1">
                    <span style={{color:C.txt,opacity:.6}}>Loyverse توصيل — {loyData.orders} طلب</span>
                    <span className="font-bold" style={{color:C.txt}}>{fmt(loyData.total)} د.ع</span>
                  </div>
                  <div className="p-4 rounded-2xl text-center"
                    style={{background:isMatch?'var(--ok-bg)':'var(--err-bg)'}}>
                    {isMatch?(
                      <div className="text-xl font-black" style={{color:C.ok}}>مطابق ✓</div>
                    ):(
                      <>
                        <div className="text-sm font-semibold mb-1" style={{color:C.err}}>فرق</div>
                        <div className="text-2xl font-black" style={{color:C.err}}>{fmt(Math.abs(diff))} د.ع</div>
                        <div className="text-xs mt-1" style={{color:C.err,opacity:.8}}>
                          {diff>0?'بوكسي أكثر من Loyverse':'Loyverse أكثر من بوكسي'}
                        </div>
                      </>
                    )}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── ADMIN DASHBOARD ───────────────────────────────────────────────────────────
function AdminDashboard({employees,settings}) {
  const now=new Date();
  const [vy,setVy]=useState(now.getFullYear());
  const [vm,setVm]=useState(now.getMonth());
  const [recs,setRecs]=useState([]);
  const [tasks,setTasks]=useState([]);
  const [todayComps,setTodayComps]=useState([]);
  const empOnly = employees.filter(e => e.role !== 'admin');
  const empOnlyIds = new Set(empOnly.map(e => e.id));

  useEffect(()=>{
    const {from,to}=monthRange(vy,vm);
    sb.from('attendance_records').select('*').gte('date',from).lte('date',to).then(({data})=>setRecs(data||[]));
  },[vy,vm]);

  useEffect(()=>{
    const today=todayStr();
    sb.from('tasks').select('*').eq('is_active',true).then(({data})=>setTasks(data||[]));
    const refreshComps=()=>sb.from('task_completions').select('*').eq('completed_date',today).then(({data})=>setTodayComps(data||[]));
    refreshComps();
    const timer=setInterval(refreshComps,30000);
    return ()=>clearInterval(timer);
  },[]);

  const pool   = settings?.monthly_pool_amount||525000;
  const allPts = recs.filter(r=>empOnlyIds.has(r.employee_id)).reduce((s,r)=>s+pts(r),0);

  const exportExcel = () => {
    const wb = XLSX.utils.book_new();
    const rows = [
      ['الموظف','التاريخ','نوع الشفت','أيام','نقاط'],
      ...recs.sort((a,b)=>a.date.localeCompare(b.date)).map(r=>{
        const emp=employees.find(e=>e.id===r.employee_id);
        return [emp?.name||'',r.date,r.shift_type==='full'?'كامل':'نص',days(r),pts(r)];
      })
    ];
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:20},{wch:12},{wch:10},{wch:8},{wch:8}];
    XLSX.utils.book_append_sheet(wb,ws,'الحضور');
    XLSX.writeFile(wb,`حضور-${MONTHS[vm]}-${vy}.xlsx`);
  };

  return (
    <div className="space-y-4">
      {(()=>{
        const today=todayStr();
        const todayTasks=tasks.filter(t=>taskApplies(t,today));
        if(!todayTasks.length) return null;
        return (
          <div className="rounded-2xl p-5 shadow-sm space-y-3" style={{background:C.card}}>
            <div className="flex items-center gap-2 mb-1">
              <Ic n="task" s={15} c={C.primary}/>
              <span className="font-bold" style={{color:C.txt}}>مهام اليوم</span>
            </div>
            {todayTasks.map(task=>{
              const targetEmps=task.assigned_to?empOnly.filter(e=>e.id===task.assigned_to):empOnly;
              return (
                <div key={task.id} className="space-y-2 pb-2 border-b last:border-b-0 last:pb-0" style={{borderColor:C.border}}>
                  <div className="text-sm font-semibold" style={{color:C.txt}}>{task.title}</div>
                  <div className="flex flex-wrap gap-2">
                    {targetEmps.map(emp=>{
                      const done=todayComps.some(c=>c.task_id===task.id&&c.employee_id===emp.id);
                      return (
                        <div key={emp.id} className="flex items-center gap-1.5 px-2.5 py-1 rounded-xl text-xs font-semibold"
                          style={{background:done?'var(--ok-bg)':'var(--err-bg)',color:done?C.ok:C.err}}>
                          <Ic n={done?'check':'x'} s={11} c={done?C.ok:C.err}/>
                          {emp.name.split(' ')[0]}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        );
      })()}

      <div className="flex items-center justify-between">
        <h2 className="font-bold" style={{color:C.txt}}>إحصائيات الشهر</h2>
        <div className="flex items-center gap-2">
          <button onClick={exportExcel} className="p-1.5 rounded-lg" style={{background:C.soft}} title="تصدير Excel">
            <Ic n="dl" s={16} c={C.ok}/>
          </button>
          <button onClick={()=>{if(vm===0){setVy(y=>y-1);setVm(11);}else setVm(m=>m-1)}}
            className="p-1.5 rounded-lg" style={{background:C.soft,color:C.primary}}><Ic n="chR" s={16}/></button>
          <span className="text-sm font-semibold" style={{color:C.txt}}>{MONTHS[vm]}</span>
          <button onClick={()=>{if(vm===11){setVy(y=>y+1);setVm(0);}else setVm(m=>m+1)}}
            className="p-1.5 rounded-lg" style={{background:C.soft,color:C.primary}}><Ic n="chL" s={16}/></button>
        </div>
      </div>

      {/* Bar chart */}
      {allPts>0 && (
        <div className="rounded-2xl p-5 shadow-sm" style={{background:C.card}}>
          <div className="text-xs font-semibold mb-3" style={{color:C.txt,opacity:.5}}>النقاط مقارنةً</div>
          <BarChart data={empOnly.map(emp=>{
            const ep=recs.filter(r=>r.employee_id===emp.id).reduce((s,r)=>s+pts(r),0);
            return {label:emp.name.split(' ')[0], value:ep, color:emp.color_hex};
          })}/>
        </div>
      )}

      {empOnly.map(emp=>{
        const er=recs.filter(r=>r.employee_id===emp.id);
        const ep=er.reduce((s,r)=>s+pts(r),0);
        const ed=er.reduce((s,r)=>s+days(r),0);
        const fs=allPts>0?(ep/allPts)*pool:0;
        return (
          <div key={emp.id} className="rounded-2xl p-5 shadow-sm" style={{background:C.card}}>
            <div className="flex items-center gap-3 mb-4">
              <div className="w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold"
                style={{background:emp.color_hex}}>
                {emp.name.charAt(0)}
              </div>
              <div>
                <div className="font-bold" style={{color:C.txt}}>{emp.name}</div>
                <div className="text-xs" style={{color:C.txt,opacity:.4}}>{emp.role==='admin'?'مدير':'موظف'}</div>
              </div>
            </div>
            <div className="grid grid-cols-3 gap-2 text-center">
              {[['أيام',ed,C.primary],['نقاط',ep,C.e2],['ثابت (تقديري)',fmt(fs)+' د.ع',C.ok]].map(([l,v,col])=>(
                <div key={l} className="p-2 rounded-xl" style={{background:C.soft}}>
                  <div className="font-black text-base leading-tight" style={{color:col}}>{v}</div>
                  <div className="text-xs mt-0.5" style={{color:C.txt,opacity:.5}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── DELIVERY BONUS STATS ──────────────────────────────────────────────────────
function DeliveryStats() {
  const PAYMENT_OPTIONS = ['توصيل','ماستر توصيل'];
  const [dateMode,setDateMode]=useState('yesterday');
  const [customFrom,setCustomFrom]=useState(todayStr());
  const [customTo,setCustomTo]=useState(todayStr());
  const [selPayments,setSelPayments]=useState(['توصيل','ماستر توصيل']);
  const [busy,setBusy]=useState(false);
  const [result,setResult]=useState(null);
  const [err,setErr]=useState('');

  const getRange = () => {
    const toISO = (dateStr, end=false) =>
      new Date(`${dateStr}T${end?'23:59:59.999':'00:00:00.000'}+03:00`).toISOString();
    const today = todayStr();
    const yest  = (()=>{const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split('T')[0];})();
    if(dateMode==='today')     return {from:toISO(today),      to:toISO(today,true)};
    if(dateMode==='yesterday') return {from:toISO(yest),       to:toISO(yest,true)};
    if(dateMode==='week'){
      const d=new Date();
      const daysBack=(d.getDay()+1)%7; // Saturday as week start
      const ws=new Date(d);ws.setDate(d.getDate()-daysBack);
      const wsStr=ws.toISOString().split('T')[0];
      return {from:toISO(wsStr), to:toISO(today,true)};
    }
    if(dateMode==='month'){
      const d=new Date();
      const ms=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
      return {from:toISO(ms), to:toISO(today,true)};
    }
    return {from:toISO(customFrom), to:toISO(customTo,true)};
  };

  const runQuery = async () => {
    if(!selPayments.length){setErr('اختر طريقة دفع واحدة على الأقل');return;}
    setBusy(true);setErr('');setResult(null);
    const {from,to}=getRange();
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPA_URL}/functions/v1/get-loyverse-sales`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({mode:'delivery_stats',from,to,payment_filters:selPayments}),
    });
    const data=await res.json();
    setBusy(false);
    if(data.error){setErr(data.error);return;}
    setResult(data);
  };

  const togglePay = p => setSelPayments(ps=>ps.includes(p)?ps.filter(x=>x!==p):[...ps,p]);

  return (
    <div className="space-y-4">
      {/* Date range */}
      <div className="rounded-2xl p-4 shadow-sm space-y-3" style={{background:C.card}}>
        <div className="text-xs font-bold uppercase tracking-widest mb-1" style={{color:C.primary}}>نطاق التاريخ</div>
        <div className="grid grid-cols-2 gap-2">
          {[['today','اليوم'],['yesterday','البارحة'],['week','هذا الأسبوع'],['month','هذا الشهر'],['custom','مخصص']].map(([v,l])=>(
            <button key={v} onClick={()=>setDateMode(v)}
              className="py-2 rounded-xl text-sm font-bold"
              style={{background:dateMode===v?C.primary:C.soft,color:dateMode===v?'#fff':C.txt}}>
              {l}
            </button>
          ))}
        </div>
        {dateMode==='custom'&&(
          <div className="grid grid-cols-2 gap-2">
            <div>
              <label className="text-xs font-semibold block mb-1" style={{color:C.txt}}>من</label>
              <input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)}
                className="w-full p-2.5 rounded-xl border text-sm outline-none"
                style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}}/>
            </div>
            <div>
              <label className="text-xs font-semibold block mb-1" style={{color:C.txt}}>إلى</label>
              <input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)}
                className="w-full p-2.5 rounded-xl border text-sm outline-none"
                style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}}/>
            </div>
          </div>
        )}
      </div>

      {/* Payment methods */}
      <div className="rounded-2xl p-4 shadow-sm space-y-3" style={{background:C.card}}>
        <div className="text-xs font-bold uppercase tracking-widest mb-1" style={{color:C.primary}}>طريقة الدفع</div>
        <div className="flex gap-2 flex-wrap">
          {PAYMENT_OPTIONS.map(p=>{
            const sel=selPayments.includes(p);
            return (
              <button key={p} onClick={()=>togglePay(p)}
                className="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-bold"
                style={{background:sel?C.primary:C.soft,color:sel?'#fff':C.txt}}>
                {sel&&<Ic n="check" s={13} c="#fff"/>}
                {p}
              </button>
            );
          })}
        </div>
      </div>

      {err&&<div className="p-3 rounded-xl text-sm text-center text-white" style={{background:C.err}}>{err}</div>}

      <button onClick={runQuery} disabled={busy}
        className="w-full py-3 rounded-xl font-bold text-white"
        style={{background:busy?'#999':C.primary}}>
        {busy?'جاري الاستعلام...':'استعلام'}
      </button>

      {result&&(
        <div className="rounded-2xl shadow-sm overflow-hidden" style={{background:C.card}}>
          <div className="px-4 py-3 text-xs font-bold" style={{background:C.soft}}>
            <div className="grid grid-cols-3" style={{color:C.txt,opacity:.6}}>
              <span>الموظف</span><span className="text-center">الطلبات</span><span className="text-left">المكافأة</span>
            </div>
          </div>
          {result.stats.map((s,i)=>(
            <div key={i} className="grid grid-cols-3 px-4 py-3.5 border-b text-sm" style={{borderColor:C.border}}>
              <span className="font-bold" style={{color:C.txt}}>{s.employee}</span>
              <span className="text-center font-black text-lg" style={{color:C.primary}}>{s.orders}</span>
              <span className="text-left font-bold" style={{color:C.ok}}>{fmt(s.bonus)} <span className="text-xs opacity-60">د.ع</span></span>
            </div>
          ))}
          <div className="grid grid-cols-3 px-4 py-3 text-sm font-black" style={{background:C.soft}}>
            <span style={{color:C.txt}}>المجموع</span>
            <span className="text-center" style={{color:C.primary}}>{result.total_orders}</span>
            <span className="text-left" style={{color:C.ok}}>{fmt(result.total_bonus)} <span className="text-xs font-bold opacity-60">د.ع</span></span>
          </div>
          <div className="px-4 py-2 text-center text-xs" style={{color:C.txt,opacity:.4}}>
            {result.bonus_per_order} د.ع × طلب
          </div>
        </div>
      )}
    </div>
  );
}

// ── PAYSLIPS (ADMIN) ──────────────────────────────────────────────────────────
function PayslipsView({employees,settings}) {
  const now=new Date();
  const empOnly = employees.filter(e => e.role !== 'admin');
  const empOnlyIds = new Set(empOnly.map(e => e.id));
  const [empId,setEmpId]=useState(()=>empOnly[0]?.id||'');
  const [month,setMonth]=useState(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`);
  const [view,setView]=useState('monthly'); // 'monthly' | 'annual'
  const [recs,setRecs]=useState([]);
  const [f,setF]=useState({fixed:'',pct:'',sales:'',bonus:'',extra:'',notes:''});
  const [busy,setBusy]=useState(false);
  const [saved,setSaved]=useState(false);
  const [loyBusy,setLoyBusy]=useState(false);
  const [loyMsg,setLoyMsg]=useState('');
  const [delBusy,setDelBusy]=useState(false);
  const [delMsg,setDelMsg]=useState('');
  const [delPicker,setDelPicker]=useState(null);

  // Annual report state
  const [annualYear,setAnnualYear]=useState(new Date().getFullYear());
  const [annualData,setAnnualData]=useState([]);

  useEffect(()=>{
    if(view!=='annual'||!empId) return;
    const from=`${annualYear}-01-01`, to=`${annualYear}-12-31`;
    sb.from('attendance_records').select('*').gte('date',from).lte('date',to).then(({data:r})=>{
      const all=r||[];
      const months=Array.from({length:12},(_,i)=>{
        const mo=String(i+1).padStart(2,'0');
        const mRecs=all.filter(rec=>rec.date.startsWith(`${annualYear}-${mo}`));
        const allP=mRecs.filter(rec=>empOnlyIds.has(rec.employee_id)).reduce((s,rec)=>s+pts(rec),0);
        const empRecs=mRecs.filter(rec=>rec.employee_id===empId);
        const empP=empRecs.reduce((s,rec)=>s+pts(rec),0);
        const empD=empRecs.reduce((s,rec)=>s+days(rec),0);
        const salary=allP>0?(empP/allP)*(settings?.monthly_pool_amount||525000):0;
        return {month:i,days:empD,pts:empP,salary};
      });
      setAnnualData(months);
    });
  },[view,empId,annualYear]);

  const pool = settings?.monthly_pool_amount||525000;
  const pct  = settings?.monthly_percentage||3.2;

  const [y,m] = month.split('-');
  const monthDate = `${y}-${m}-01`;

  useEffect(()=>{
    if(!empId||!month) return;
    const [yr,mo]=month.split('-');
    const from=`${yr}-${mo}-01`;
    const last=new Date(parseInt(yr),parseInt(mo),0).getDate();
    const to=`${yr}-${mo}-${String(last).padStart(2,'0')}`;

    Promise.all([
      sb.from('attendance_records').select('*').gte('date',from).lte('date',to),
      sb.from('payslips').select('*').eq('employee_id',empId).eq('month',from).maybeSingle()
    ]).then(([{data:recData},{data:slip}])=>{
      const r=recData||[];
      setRecs(r);
      if(slip){
        setF({fixed:slip.fixed_amount||'',pct:slip.percentage_amount||'',sales:slip.sales_amount||'',
              bonus:slip.bonus||'',extra:slip.extra_amount||'',notes:slip.notes||''});
      } else {
        const allP=r.filter(x=>empOnlyIds.has(x.employee_id)).reduce((s,x)=>s+pts(x),0);
        const empP=r.filter(x=>x.employee_id===empId).reduce((s,x)=>s+pts(x),0);
        const fs=allP>0?(empP/allP)*pool:0;
        setF({fixed:Math.round(fs),pct:'',sales:'',bonus:'',extra:'',notes:''});
      }
    });
  },[empId,month]);

  useEffect(()=>{
    if(!recs.length) return;
    const allP=recs.filter(r=>empOnlyIds.has(r.employee_id)).reduce((s,r)=>s+pts(r),0);
    const empP=recs.filter(r=>r.employee_id===empId).reduce((s,r)=>s+pts(r),0);
    const salesAmt=parseFloat(f.sales)||0;
    const share=allP>0?(empP/allP)*(salesAmt*pct/100):0;
    setF(p=>({...p,pct:Math.round(share)}));
  },[f.sales,recs,empId]);

  const total=(parseFloat(f.fixed)||0)+(parseFloat(f.pct)||0)+(parseFloat(f.bonus)||0)+(parseFloat(f.extra)||0);

  const fetchLoyverse = async () => {
    setLoyBusy(true); setLoyMsg('');
    const {data:{session}} = await sb.auth.getSession();
    const res = await fetch(`${SUPA_URL}/functions/v1/get-loyverse-sales`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},
      body: JSON.stringify({month}),
    });
    const data = await res.json();
    setLoyBusy(false);
    if(data.error){ setLoyMsg('خطأ: ' + data.error); setTimeout(()=>setLoyMsg(''),4000); return; }
    setF(p=>({...p, sales: String(data.total)}));
    setLoyMsg(`تم جلب ${fmt(data.total)} د.ع`);
    setTimeout(()=>setLoyMsg(''),3000);
  };

  const fetchDeliveryBonus = async () => {
    setDelBusy(true); setDelMsg(''); setDelPicker(null);
    const [yr,mo]=month.split('-');
    const lastD=new Date(parseInt(yr),parseInt(mo),0).getDate();
    const from=new Date(`${yr}-${mo}-01T00:00:00.000+03:00`).toISOString();
    const to  =new Date(`${yr}-${mo}-${String(lastD).padStart(2,'0')}T23:59:59.999+03:00`).toISOString();
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPA_URL}/functions/v1/get-loyverse-sales`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({mode:'delivery_stats',from,to,payment_filters:['توصيل','ماستر توصيل']}),
    });
    const data=await res.json();
    setDelBusy(false);
    if(data.error){setDelMsg('خطأ: '+data.error);setTimeout(()=>setDelMsg(''),4000);return;}
    if(!data.stats?.length){setDelMsg('لا توجد طلبات توصيل في هذا الشهر');setTimeout(()=>setDelMsg(''),3000);return;}
    if(data.stats.length===1){
      const s=data.stats[0];
      setF(p=>({...p,bonus:s.bonus}));
      setDelMsg(`${s.employee} · ${s.orders} طلب × 400 = ${fmt(s.bonus)} د.ع`);
      setTimeout(()=>setDelMsg(''),5000);
    } else {
      setDelPicker(data.stats);
    }
  };

  const applyDeliveryBonus = s => {
    setF(p=>({...p,bonus:s.bonus}));
    setDelMsg(`${s.employee} · ${s.orders} طلب × 400 = ${fmt(s.bonus)} د.ع`);
    setDelPicker(null);
    setTimeout(()=>setDelMsg(''),5000);
  };

  const save = async () => {
    setBusy(true);
    const payload={employee_id:empId,month:monthDate,fixed_amount:parseFloat(f.fixed)||0,
      percentage_amount:parseFloat(f.pct)||0,sales_amount:parseFloat(f.sales)||0,
      bonus:parseFloat(f.bonus)||0,extra_amount:parseFloat(f.extra)||0,notes:f.notes};
    const {data:ex}=await sb.from('payslips').select('id').eq('employee_id',empId).eq('month',monthDate).maybeSingle();
    if(ex) await sb.from('payslips').update(payload).eq('id',ex.id);
    else await sb.from('payslips').insert(payload);
    setBusy(false); setSaved(true); setTimeout(()=>setSaved(false),2500);
  };

  const exportPdf = () => {
    const emp=employees.find(e=>e.id===empId);
    const mn=MONTHS[parseInt(m)-1];
    const rows=[
      ['المبلغ الثابت (حصة من المجموع الشهري)',f.fixed],
      ['حصة النسبة من المبيعات',f.pct],
      ['بونص',f.bonus],
      ['مبلغ إضافي',f.extra],
    ].filter(([,v])=>parseFloat(v)>0)
     .map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F0EAE8;font-size:14px"><span style="color:#555">${l}</span><span style="font-weight:700">${fmt(v)} د.ع</span></div>`)
     .join('');
    const notesHtml=f.notes?`<div style="margin-top:20px;padding:14px;background:#FBF1EC;border-radius:10px;font-size:13px;color:#555"><strong>ملاحظة: </strong>${f.notes}</div>`:'';
    const html=`<div style="font-family:Tahoma,'Segoe UI','Arial Unicode MS',sans-serif;direction:rtl;padding:50px;color:#3A2F3D;background:#fff;width:740px;word-spacing:2px">
      <div style="text-align:center;margin-bottom:28px">
        <div style="font-size:30px;font-weight:900;color:#6B5876;letter-spacing:6px">STACKS</div>
        <div style="font-size:14px;color:#999;margin-top:6px">Stationery — كشف راتب شهري</div>
      </div>
      <div style="border-top:3px solid #6B5876;margin-bottom:28px"></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:24px">
        <div><div style="font-size:11px;color:#999;margin-bottom:4px">الموظف</div><div style="font-size:22px;font-weight:900">${emp?.name||''}</div></div>
        <div><div style="font-size:11px;color:#999;margin-bottom:4px">الشهر</div><div style="font-size:22px;font-weight:900">${mn} ${y}</div></div>
      </div>
      <div style="background:#F5EDE8;border-radius:12px;padding:18px;margin-bottom:28px">
        <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #E8DDE0;font-size:14px"><span style="color:#666">أيام الدوام</span><span style="font-weight:700">${empD} يوم</span></div>
        <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #E8DDE0;font-size:14px"><span style="color:#666">النقاط المكتسبة</span><span style="font-weight:700">${empP} نقطة</span></div>
        <div style="display:flex;justify-content:space-between;padding:7px 0;font-size:14px"><span style="color:#666">اجمالي نقاط الشهر</span><span style="font-weight:700">${allP} نقطة</span></div>
      </div>
      ${rows}
      <div style="display:flex;justify-content:space-between;padding:18px 0;border-top:2px solid #6B5876;margin-top:10px">
        <span style="font-weight:900;font-size:17px">الاجمالي</span>
        <span style="font-weight:900;font-size:22px;color:#6B5876">${fmt(total)} د.ع</span>
      </div>
      ${notesHtml}
      <div style="margin-top:50px;border-top:1px solid #EEE;padding-top:14px;font-size:12px;color:#AAA;text-align:center">
        صدر بتاريخ ${new Date().toLocaleDateString('ar-IQ')} · STACKS Stationery
      </div>
    </div>`;
    const wrap=document.createElement('div');
    wrap.style.cssText='position:fixed;left:0;top:0;z-index:-9999';
    wrap.innerHTML=html;
    document.body.appendChild(wrap);
    html2pdf().set({
      margin:0,
      filename:`كشف-${emp?.name}-${mn}-${y}.pdf`,
      html2canvas:{scale:2,useCORS:true,logging:false},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
    }).from(wrap.firstChild).save().then(()=>document.body.removeChild(wrap));
  };

  const emp=employees.find(e=>e.id===empId);
  const er=recs.filter(r=>r.employee_id===empId);
  const allP=recs.filter(r=>empOnlyIds.has(r.employee_id)).reduce((s,r)=>s+pts(r),0);
  const empP=er.reduce((s,r)=>s+pts(r),0);
  const empD=er.reduce((s,r)=>s+days(r),0);

  const fields=[
    ['المبلغ الثابت','fixed'],['حصة النسبة','pct'],['حجم المبيعات','sales'],
    ['بونص (اختياري)','bonus'],['مبلغ إضافي (اختياري)','extra'],
  ];

  return (
    <div className="space-y-4">
      {/* View toggle */}
      <div className="flex gap-2 p-1 rounded-2xl" style={{background:C.soft}}>
        {[['monthly','كشف الشهر'],['annual','التقرير السنوي'],['delivery','مكافأة التوصيل']].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)}
            className="flex-1 py-2 rounded-xl text-sm font-bold transition-all"
            style={{background:view===v?C.card:'transparent',color:view===v?C.primary:C.txt,
                    boxShadow:view===v?'0 1px 4px rgba(0,0,0,.08)':'none'}}>
