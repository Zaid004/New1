// ── BAR CHART ─────────────────────────────────────────────────────────────────
function BarChart({data}) {
  const max = Math.max(...data.map(d=>d.value), 1);
  const H = 80;
  return (
    <div className="flex items-end justify-center gap-4 pt-2" style={{height: H+48}}>
      {data.map((d,i)=>(
        <div key={i} className="flex flex-col items-center gap-1.5">
          <div className="text-xs font-black" style={{color:d.color}}>{d.value}</div>
          <div className="w-14 rounded-t-xl transition-all duration-500"
            style={{height: Math.max((d.value/max)*H,4), background:d.color}}/>
          <div className="text-xs font-semibold text-center leading-tight" style={{color:C.txt,opacity:.6,maxWidth:56}}>{d.label}</div>
        </div>
      ))}
    </div>
  );
}

// ── SETTINGS SECTION (inside EmployeesView) ───────────────────────────────────
function SettingsSection({settings, onSaved}) {
  const [pool, setPool] = useState(String(settings?.monthly_pool_amount||525000));
  const [pct,  setPct]  = useState(String(settings?.monthly_percentage||3.2));
  const [net,  setNet]  = useState(settings?.allowed_network||'');
  const [busy, setBusy] = useState(false);
  const [msg,  setMsg]  = useState({text:'',ok:true});
  const flash = (text,ok=true)=>{setMsg({text,ok});setTimeout(()=>setMsg({text:'',ok:true}),3000);};

  const save = async () => {
    setBusy(true);
    const {error} = await sb.from('settings')
      .update({monthly_pool_amount: parseFloat(parseNum(pool))||525000, monthly_percentage: parseFloat(pct)||3.2, allowed_network: net.trim()})
      .eq('id', settings.id);
    setBusy(false);
    if(error){flash(error.message,false);return;}
    flash('تم حفظ الإعدادات');
    if(onSaved) onSaved();
  };

  return (
    <div className="rounded-2xl p-5 shadow-sm space-y-4" style={{background:C.card}}>
      <h3 className="font-bold" style={{color:C.txt}}>إعدادات الراتب</h3>
      <div>
        <label className="text-xs font-semibold block mb-1" style={{color:C.txt}}>المجموع الشهري (د.ع)</label>
        <input type="text" inputMode="numeric" value={fmtNum(pool)} onChange={e=>setPool(parseNum(e.target.value))}
          className="w-full p-3 rounded-xl border text-sm outline-none"
          style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}} placeholder="525,000"/>
      </div>
      <div>
        <label className="text-xs font-semibold block mb-1" style={{color:C.txt}}>نسبة المبيعات (%)</label>
        <input type="number" step="0.1" value={pct} onChange={e=>setPct(e.target.value)}
          className="w-full p-3 rounded-xl border text-sm outline-none"
          style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}} placeholder="3.2"/>
      </div>
      <div>
        <label className="text-xs font-semibold block mb-1" style={{color:C.txt}}>IP المكتبة العام</label>
        <input type="text" value={net} onChange={e=>setNet(e.target.value)}
          className="w-full p-3 rounded-xl border text-sm outline-none"
          style={{borderColor:C.border,background:'var(--input-bg)',color:C.txt}}
          placeholder="مثال: 87.100.25.4 — اتركه فارغاً لإلغاء التقييد"/>
        <p className="text-xs mt-1" style={{color:C.txt,opacity:.45}}>اكتشف IP المكتبة من whatismyip.com أثناء اتصالك بشبكتها · الموظف لن يستطيع تسجيل الحضور خارجها</p>
      </div>
      {msg.text && <div className="p-3 rounded-xl text-sm text-center text-white" style={{background:msg.ok?C.ok:C.err}}>{msg.text}</div>}
      <button onClick={save} disabled={busy}
        className="w-full py-3 rounded-xl font-bold text-white"
        style={{background:busy?'#999':C.primary}}>
        {busy?'جاري الحفظ...':'حفظ الإعدادات'}
      </button>
    </div>
  );
}

// ── EMPLOYEES MANAGEMENT (ADMIN) ─────────────────────────────────────────────
function EmployeesView({employees, settings, onRefresh}) {

  const [showAdd, setShowAdd] = useState(false);

  const [resetTarget, setResetTarget] = useState(null);
  const [newPass, setNewPass] = useState('');
  const [editTarget, setEditTarget] = useState(null);
  const [editForm, setEditForm] = useState({});
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState({text:'',ok:true});

  const flash = (text, ok=true) => { setMsg({text,ok}); setTimeout(()=>setMsg({text:'',ok:true}),3000); };

  const addEmployee = async () => {
    if(!form.name.trim()||!form.username.trim()||!form.password) { flash('يرجى تعبئة جميع الحقول',false); return; }
    if(form.password.length<6) { flash('كلمة المرور 6 أحرف على الأقل',false); return; }
    setBusy(true);
    const res = await callFn('create', form);
    setBusy(false);
    if(res.error){ flash(res.error, false); return; }
    flash('تم إضافة الموظف بنجاح');
    setForm({name:'',username:'',password:'',color_hex:'#A8825B',role:'employee'});
    setShowAdd(false);
    onRefresh();
  };

  const deleteEmployee = async (emp) => {
    if(!confirm(`حذف ${emp.name}؟ لا يمكن التراجع.`)) return;
    setBusy(true);
    const res = await callFn('delete', {employee_id: emp.id});
    setBusy(false);
    if(res.error){ flash(res.error, false); return; }
    flash('تم الحذف');
    onRefresh();
  };

  const resetPassword = async () => {
    if(!newPass||newPass.length<6){ flash('6 أحرف على الأقل',false); return; }
    setBusy(true);
    const res = await callFn('reset_password', {employee_id: resetTarget.id, new_password: newPass});
    setBusy(false);
    if(res.error){ flash(res.error, false); return; }
    flash('تم تغيير كلمة المرور');
    setResetTarget(null); setNewPass('');

    setEditForm({name: emp.name, username: emp.username||'', color_hex: emp.color_hex, role: emp.role});

    if(!editForm.name.trim()){ flash('الاسم مطلوب',false); return; }

    const res = await callFn('update', {employee_id: editTarget.id, ...editForm});
    setBusy(false);
    if(res.error){ flash(res.error, false); return; }

    <div className="space-y-4">

              <div className="font-bold" style={{color:C.txt}}>{emp.name}</div>
              <div className="text-xs" style={{color:C.txt,opacity:.45}}>
                {emp.username ? `@${emp.username}` : ''} · {emp.role==='admin'?'مدير':'موظف'}

            </div>
          </div>
          <div className="flex gap-2">
            <button onClick={()=>{setResetTarget(emp);setNewPass('');}}

              تغيير الباسورد

            <button onClick={()=>openEdit(emp)}

              style={{background:'var(--edit-bg)'}}>

            <button onClick={()=>deleteEmployee(emp)}

              style={{background:'var(--err-bg)'}}>
              <Ic n="trash" s={14} c={C.err}/>

              <div className="flex gap-2">
                {COLORS.map(col=>(
                  <button key={col} onClick={()=>setEditForm(p=>({...p,color_hex:col}))}
                    className="w-8 h-8 rounded-lg transition-transform"
                    style={{background:col,transform:editForm.color_hex===col?'scale(1.25)':'scale(1)',outline:editForm.color_hex===col?`2px solid ${col}`:undefined,outlineOffset:2}}/>
                ))}
              </div>
            </div>
            <div>
              <label className="text-xs font-semibold block mb-1" style={{color:C.txt}}>الصلاحية</label>
              <div className="flex gap-2">
                {[['employee','موظف'],['admin','مدير']].map(([v,l])=>(
                  <button key={v} onClick={()=>setEditForm(p=>({...p,role:v}))}
                    className="flex-1 py-2 rounded-xl text-sm font-bold"
                    style={{background:editForm.role===v?C.primary:C.soft,color:editForm.role===v?'#fff':C.txt}}>
                    {l}
                  </button>
                ))}
              </div>
            </div>
            <div className="text-xs px-1" style={{color:C.txt,opacity:.5}}>
              تغيير اسم المستخدم سيستلزم تسجيل الدخول مجدداً باسم المستخدم الجديد.
            </div>
            <button onClick={saveEdit} disabled={busy}
              className="w-full py-3 rounded-xl font-bold text-white"
              style={{background:busy?'#999':C.ok}}>
              {busy?'جاري الحفظ...':'حفظ التعديلات'}
            </button>
          </div>
        </div>
      )}

      <div className="pt-2">
        <div className="flex items-center gap-2 mb-3 px-1">
          <Ic n="gear" s={16} c={C.primary}/>
          <span className="text-xs font-bold uppercase tracking-widest" style={{color:C.primary}}>إعدادات الراتب</span>
        </div>
        <SettingsSection settings={settings} onSaved={onRefresh}/>
      </div>
    </div>
  );
}

// ── AUDIT LOG (ADMIN) ─────────────────────────────────────────────────────────
function AuditLogView({employees}) {
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    sb.from('audit_log')
      .select('*')
      .order('created_at',{ascending:false})
      .limit(200)
      .then(({data})=>{ setLogs(data||[]); setLoading(false); });
  },[]);

  const getEmp = id => employees.find(e=>e.id===id);

  const ACTION = {
    add:   {label:'إضافة',   bg:'var(--ok-bg)', color:C.ok},
    update:{label:'تعديل',   bg:'var(--edit-bg)', color:C.primary},
    delete:{label:'حذف',     bg:'var(--err-bg)', color:C.err},
  };

  const shiftLabel = s => s==='full'?'كامل':'نص';

  const fmtDate = iso => {
    const d=new Date(iso);
    const h=String(d.getHours()).padStart(2,'0');
    const min=String(d.getMinutes()).padStart(2,'0');
    return `${d.getDate()} ${MONTHS[d.getMonth()]} · ${h}:${min}`;
  };

  // Group logs by date (record_date)
  const grouped = logs.reduce((acc,log)=>{
    const key=log.record_date;
    if(!acc[key]) acc[key]=[];
    acc[key].push(log);
    return acc;
  },{});

  return (
    <div className="space-y-4">
      <h2 className="font-bold text-lg" style={{color:C.txt}}>سجل التعديلات</h2>

      {loading && <div className="text-center py-8 text-sm" style={{color:C.txt,opacity:.4}}>جاري التحميل...</div>}

      {!loading && logs.length===0 && (
        <div className="text-center py-12 text-sm" style={{color:C.txt,opacity:.4}}>لا توجد تعديلات بعد</div>
      )}

      {Object.entries(grouped).sort(([a],[b])=>b.localeCompare(a)).map(([date,dayLogs])=>(
        <div key={date}>
          <div className="text-xs font-bold mb-2 px-1" style={{color:C.txt,opacity:.4}}>
            {(()=>{const p=date.split('-');return `${parseInt(p[2])} ${MONTHS[parseInt(p[1])-1]} ${p[0]}`;})()}
          </div>
          <div className="space-y-2">
            {dayLogs.map(log=>{
              const emp    = getEmp(log.employee_id);
              const byEmp  = getEmp(log.changed_by);
              const act    = ACTION[log.action] || ACTION.update;
              return (
                <div key={log.id} className="rounded-2xl p-4 shadow-sm" style={{background:C.card}}>
                  <div className="flex items-start justify-between gap-2">
                    <div className="flex items-center gap-2 flex-1 min-w-0">
                      {/* color dot of affected employee */}
                      {emp && <div className="w-2.5 h-2.5 rounded-full flex-shrink-0 mt-0.5" style={{background:emp.color_hex}}/>}
                      <div className="min-w-0">
                        <div className="font-semibold text-sm truncate" style={{color:C.txt}}>
                          {emp?.name || '—'}
                        </div>
                        <div className="text-xs mt-0.5" style={{color:C.txt,opacity:.5}}>
                          {log.action==='add'    && `${shiftLabel(log.new_shift)} شفت`}
                          {log.action==='update' && `${shiftLabel(log.old_shift)} ← ${shiftLabel(log.new_shift)}`}
                          {log.action==='delete' && `حُذف ${shiftLabel(log.old_shift)} شفت`}
                          {log.is_auto && <span className="mr-1 opacity-60">(تلقائي)</span>}
                        </div>
                      </div>
                    </div>
                    <div className="text-left flex-shrink-0">
                      <span className="text-xs font-bold px-2 py-0.5 rounded-lg" style={{background:act.bg,color:act.color}}>
                        {act.label}
                      </span>
                    </div>
                  </div>
                  <div className="flex items-center justify-between mt-3 pt-2" style={{borderTop:`1px solid ${C.soft}`}}>
                    <div className="text-xs" style={{color:C.primary,opacity:.8}}>
                      {byEmp ? `بواسطة: ${byEmp.name}` : '—'}
                    </div>
                    <div className="text-xs" style={{color:C.txt,opacity:.35}}>
                      {fmtDate(log.created_at)}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [session,setSession]=useState(undefined);
  const [me,setMe]=useState(null);
  const [employees,setEmployees]=useState([]);
  const [settings,setSettings]=useState(null);
  const [tab,setTab]=useState('calendar');
  const [dark,setDark]=useState(()=>localStorage.getItem('dark')==='1');
  const [attendanceBanner,setAttendanceBanner]=useState(false);

  const toggleDark = () => {
    const next=!dark;
    setDark(next);
    document.documentElement.classList.toggle('dark',next);
    localStorage.setItem('dark',next?'1':'0');
  };

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session:s}})=>{
      setSession(s);
      if(s) loadData(s);
      else setSession(null);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>{
      setSession(s);
      if(s) loadData(s);
      else {setMe(null);setEmployees([]);}
    });
    return ()=>subscription.unsubscribe();
  },[]);

  const loadData = async s => {
    const [{data:emps},{data:sets}]=await Promise.all([
      sb.from('employees').select('*'),
      sb.from('settings').select('*').order('effective_from',{ascending:false}).limit(1).maybeSingle()
    ]);
    const all=emps||[];
    setEmployees(all);
    const myEmp=all.find(e=>e.auth_user_id===s.user.id)||null;
    setMe(myEmp);
    setSettings(sets);
    // Check attendance reminder
    if(myEmp && myEmp.role!=='admin') {
      const today=todayStr();
      const {data:todayRec}=await sb.from('attendance_records').select('id').eq('employee_id',myEmp.id).eq('date',today).maybeSingle();
      const h=new Date().getHours();
      if(!todayRec && h>=8 && h<22) setAttendanceBanner(true);
    }
  };

  const logout = async () => {
    await sb.auth.signOut();
    setMe(null); setSession(null); setTab('calendar'); setAttendanceBanner(false);
  };

  if(session===undefined) return (
    <div className="min-h-screen flex items-center justify-center" style={{background:C.bg}}>
      <div className="text-center">
        <div className="w-14 h-14 rounded-2xl mx-auto mb-3 flex items-center justify-center font-black text-xl text-white" style={{background:C.primary}}>S</div>
        <div className="text-sm" style={{color:C.txt,opacity:.4}}>جاري التحميل...</div>
      </div>
    </div>
  );

  if(!session||!me) return <AuthScreen/>;

  const isAdmin=me.role==='admin';
  const tabs=[
    {id:'calendar',label:'التقويم',icon:'calendar'},
    {id:'dashboard',label:'الرئيسية',icon:'home'},
    ...(isAdmin?[
      {id:'payslips',label:'الرواتب',icon:'file'},
      {id:'employees',label:'الموظفون',icon:'user'},
      {id:'audit',label:'السجل',icon:'clock'},
    ]:[]),
  ];

  return (
    <div className="min-h-screen" style={{background:C.bg}}>
      {/* Header */}
      <div className="shadow-sm px-4 py-3 flex items-center justify-between sticky top-0 z-40"
        style={{background:C.card}}>
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded-xl flex items-center justify-center font-black text-sm text-white" style={{background:C.primary}}>S</div>
          <div>
            <div className="text-xs font-black tracking-widest leading-none" style={{color:C.primary}}>STACKS</div>
            <div className="text-xs leading-none mt-0.5" style={{color:C.txt,opacity:.45}}>{me.name}</div>
          </div>
        </div>
        <div className="flex items-center gap-2">
          {isAdmin&&<span className="text-xs px-2 py-1 rounded-lg font-semibold" style={{background:'var(--badge-bg)',color:C.primary}}>مدير</span>}
          <button onClick={toggleDark} className="p-2 rounded-xl" style={{background:C.soft}}>
            <Ic n={dark?'sun':'moon'} s={17} c={C.primary}/>
          </button>
          <button onClick={logout} className="p-2 rounded-xl" style={{background:C.soft}}>
            <Ic n="logout" s={17} c={C.err}/>
          </button>
        </div>
      </div>

      {/* Attendance banner */}
      {attendanceBanner && (
        <div className="mx-4 mt-4 p-3 rounded-2xl flex items-center justify-between"
          style={{background:'var(--edit-bg)'}}>
          <div className="flex items-center gap-2">
            <Ic n="bell" s={16} c={C.primary}/>
            <span className="text-sm font-semibold" style={{color:C.primary}}>لم تسجل حضورك اليوم بعد</span>
          </div>
          <button onClick={()=>{setAttendanceBanner(false);setTab('calendar');}}
            className="text-xs font-bold px-3 py-1 rounded-lg text-white"
            style={{background:C.primary}}>
            سجّل الآن
          </button>
        </div>
      )}

      {/* Page content */}
      <div className="p-4 max-w-lg mx-auto pb-24">
        {tab==='calendar'&&<CalendarView me={me} employees={employees} isAdmin={isAdmin} settings={settings}/>}
        {tab==='dashboard'&&!isAdmin&&<EmpDashboard me={me} employees={employees} settings={settings} onRefresh={()=>loadData(session)}/>}
        {tab==='dashboard'&&isAdmin&&<AdminDashboard employees={employees} settings={settings}/>}
        {tab==='payslips'&&isAdmin&&<PayslipsView employees={employees} settings={settings}/>}
        {tab==='employees'&&isAdmin&&<EmployeesView employees={employees} settings={settings} onRefresh={()=>loadData(session)}/>}
        {tab==='audit'&&isAdmin&&<AuditLogView employees={employees}/>}
      </div>

      {/* Bottom nav */}
      <div className="fixed bottom-0 inset-x-0 border-t" style={{background:C.card,borderColor:C.border}}>
        <div className="flex max-w-lg mx-auto">
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              className="flex-1 py-3 flex flex-col items-center gap-0.5 transition-colors"
              style={{color:tab===t.id?C.primary:'var(--muted)'}}>
              <Ic n={t.icon} s={22} c={tab===t.id?C.primary:'var(--muted)'}/>
              <span className="text-xs font-semibold">{t.label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
